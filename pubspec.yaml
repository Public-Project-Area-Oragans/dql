name: dol
description: "Dev Quest Library — 게임형 문서 학습 시스템"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # 게임 엔진
  flame: ^1.21.0

  # 상태관리
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # 라우팅
  go_router: ^17.2.0

  # 네트워크
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0

  # JSON / 모델
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0

  # 로컬 저장소
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_screenutil: ^5.9.3
  flutter_markdown: ^0.7.6
  markdown: ^7.0.0
  # Mermaid flowchart 네이티브 렌더링 (Phase 3 PR #4). 순수 Dart/CustomPaint.
  graphview: ^1.2.0
  flutter_svg: ^2.0.10+1

  # 유틸
  intl: ^0.19.0
  uuid: ^4.5.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^3.0.0
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  flutter_lints: ^6.0.0
  # fix-10b: ai_diagram_describer / content_builder 에서 fence body 해시용.
  crypto: ^3.0.3
  # art-1: tool/verify_palette.dart 가 PNG 픽셀 값 16색 팔레트 검증.
  image: ^4.3.0

flutter:
  uses-material-design: true
  assets:
    - content/books/java-spring/book.json
    - content/books/dart/book.json
    - content/books/flutter/book.json
    - content/books/mysql/book.json
    - content/books/msa/book.json
    # art-2: UI 크롬 (9-slice 프레임 + 버튼 3상태). Manifest §7.1 준수,
    # _anchors/ 는 런타임 번들 제외.
    - assets/sprites/ui/frames/
    - assets/sprites/ui/buttons/
    # art-3: 타이틀 씬 — 배경 + 로고.
    - assets/sprites/environments/title/
    - assets/sprites/ui/logos/
    # art-4: 중앙 홀 3층 parallax + 4 분관 문.
    - assets/sprites/environments/main_hall/
    - assets/sprites/objects/doors/
  fonts:
    # fix-4a: ASCII 박스 드로잉·코드 블록 열 정렬을 브라우저·OS 독립적으로
    # 보장하기 위해 JetBrains Mono 를 번들링. SIL Open Font License 1.1.
    # https://github.com/JetBrains/JetBrainsMono
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
    # art-4c: 한글 라벨 (분관 도어 사인 등) 가독성 위해 JetBrains Mono Hangul 번들.
    # JetBrainsMono 와 동일한 영문 mono 메트릭 + 한글 글리프 추가. SIL OFL 1.1.
    # https://github.com/Jhyub/JetBrainsMonoHangul (release 20260222)
    - family: JetBrainsMonoHangul
      fonts:
        - asset: assets/fonts/JetBrainsMonoHangul-Regular.ttf
        - asset: assets/fonts/JetBrainsMonoHangul-Bold.ttf
          weight: 700
